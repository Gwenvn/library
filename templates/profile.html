{% extends 'base.html' %}
{% block title %}个人中心{% endblock %}

{% block content %}
<div class="section-title mb-4">
    <span class="title-dot"></span>
    <i class="bi bi-person-circle text-primary"></i> 个人中心
</div>

<div class="row g-4">
    <!-- 左侧：用户信息 -->
    <div class="col-md-4">
        <div class="detail-card text-center">
            <!-- 头像 -->
            <div style="width:80px;height:80px;border-radius:50%;
                        background:linear-gradient(135deg,#1e88e5,#1565c0);
                        display:inline-flex;align-items:center;justify-content:center;
                        font-size:2.2rem;color:#fff;margin-bottom:14px;
                        box-shadow:0 6px 20px rgba(30,136,229,.35)">
                <i class="bi bi-person-fill"></i>
            </div>
            <h5 class="fw-bold mb-1" style="color:#1a237e">{{ user.username }}</h5>
            <p class="text-muted small mb-3">{{ user.email }}</p>
            <span class="badge bg-primary px-3 py-2 rounded-pill">普通用户</span>
            <hr class="my-3">
            <div class="text-muted small text-start">
                <div class="d-flex justify-content-between py-1">
                    <span><i class="bi bi-calendar3 me-2"></i>注册时间</span>
                    <span>{{ user.created_at.strftime('%Y-%m-%d') }}</span>
                </div>
            </div>
        </div>

        <!-- 借阅统计 -->
        <div class="detail-card mt-3">
            <div class="section-title mb-3">
                <span class="title-dot"></span>
                <i class="bi bi-bar-chart text-primary"></i> 借阅统计
            </div>
            <div class="row g-2 text-center">
                <div class="col-4">
                    <div class="py-2">
                        <div class="fw-bold fs-4 text-primary">{{ total }}</div>
                        <div class="text-muted" style="font-size:.78rem">总借阅</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="py-2" style="border-left:1px solid #f0f4fb;border-right:1px solid #f0f4fb">
                        <div class="fw-bold fs-4 text-warning">{{ current }}</div>
                        <div class="text-muted" style="font-size:.78rem">借阅中</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="py-2">
                        <div class="fw-bold fs-4 text-success">{{ done }}</div>
                        <div class="text-muted" style="font-size:.78rem">已归还</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧：修改密码 -->
    <div class="col-md-8">
        <div class="detail-card">
            <div class="section-title mb-4">
                <span class="title-dot"></span>
                <i class="bi bi-shield-lock text-primary"></i> 修改密码
            </div>
            <form method="POST" action="{{ url_for('change_password') }}" style="max-width:420px">
                <div class="mb-3">
                    <label class="form-label-sm-bold">当前密码</label>
                    <div class="input-group input-icon-wrap">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="old_password" class="form-control"
                               placeholder="请输入当前密码" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label-sm-bold">新密码</label>
                    <div class="input-group input-icon-wrap">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="new_password" class="form-control"
                               placeholder="请输入新密码（至少4位）" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label-sm-bold">确认新密码</label>
                    <div class="input-group input-icon-wrap">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="confirm_password" class="form-control"
                               placeholder="再次输入新密码" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary px-4 py-2">
                    <i class="bi bi-check-circle me-1"></i> 确认修改
                </button>
            </form>
        </div>

        <!-- 快捷操作 -->
        <div class="detail-card mt-3">
            <div class="section-title mb-3">
                <span class="title-dot"></span>
                <i class="bi bi-grid text-primary"></i> 快捷操作
            </div>
            <div class="d-flex gap-3 flex-wrap">
                <a href="{{ url_for('my_borrow') }}" class="btn btn-outline-primary px-4">
                    <i class="bi bi-clock-history me-1"></i> 我的借阅记录
                </a>
                <a href="{{ url_for('book_list') }}" class="btn btn-outline-success px-4">
                    <i class="bi bi-search me-1"></i> 去借书
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
