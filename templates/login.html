{% extends 'base.html' %}
{% block title %}用户登录{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box text-center">
        <!-- 图标 -->
        <div class="auth-logo bg-primary" style="background:linear-gradient(135deg,#1e88e5,#1565c0)!important">
            <i class="bi bi-person-fill text-white"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color:#0d47a1">欢迎登录</h4>
        <p class="text-muted mb-4" style="font-size:.88rem">在线图书借阅管理系统</p>

        <div class="card auth-card text-start">
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label-sm-bold">用户名</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label-sm-bold">密码</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth btn-auth-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i> 登 录
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                还没有账号？
                <a href="{{ url_for('register') }}" class="fw-bold text-primary text-decoration-none ms-1">
                    立即注册
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
