<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d1b4b 0%, #1a237e 40%, #1565c0 100%);
        }
        /* 背景装饰圆 */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: rgba(255,255,255,.04);
            border-radius: 50%;
            top: -150px; right: -100px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 360px; height: 360px;
            background: rgba(255,255,255,.04);
            border-radius: 50%;
            bottom: -100px; left: -80px;
            pointer-events: none;
        }
        .login-wrap { width: 100%; max-width: 420px; padding: 16px; position: relative; z-index: 1; }
        .glass-icon {
            width: 76px; height: 76px;
            background: rgba(255,255,255,.14);
            border: 1.5px solid rgba(255,255,255,.25);
            backdrop-filter: blur(8px);
            border-radius: 22px;
            display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 2.1rem;
            margin-bottom: 18px;
        }
        .login-card {
            border: none !important;
            border-radius: 20px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,.35) !important;
            overflow: hidden;
        }
        .login-card .card-body { padding: 32px 32px 24px; }
        .login-card .card-footer {
            background: #f8faff !important;
            border-top: 1px solid #eef2fb !important;
            padding: 14px 32px;
            font-size: .88rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-wrap text-center">

    <div class="glass-icon">
        <i class="bi bi-shield-lock-fill text-white"></i>
    </div>
    <h4 class="text-white fw-bold mb-1">管理后台</h4>
    <p class="mb-4" style="color:rgba(255,255,255,.55);font-size:.88rem">在线图书借阅管理系统</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3 border-0 text-start mb-3" style="font-size:.9rem">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card login-card text-start">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="mb-3">
                    <label class="form-label-sm-bold">管理员账号</label>
                    <div class="input-group input-icon-wrap">
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text" name="username" class="form-control"
                               placeholder="请输入管理员用户名" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label-sm-bold">密码</label>
                    <div class="input-group input-icon-wrap">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control"
                               placeholder="请输入密码" required>
                    </div>
                </div>
                <button type="submit" class="btn-auth btn-auth-primary">
                    <i class="bi bi-box-arrow-in-right me-1"></i> 进入后台
                </button>
            </form>
        </div>
        <div class="card-footer">
            <a href="{{ url_for('index') }}" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>返回前台首页
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
