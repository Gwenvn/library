{% extends 'base.html' %}
{% block title %}用户注册{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box text-center">
        <div class="auth-logo" style="background:linear-gradient(135deg,#43a047,#2e7d32)">
            <i class="bi bi-person-plus-fill text-white"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color:#1b5e20">创建账号</h4>
        <p class="text-muted mb-4" style="font-size:.88rem">注册后即可免费借阅图书</p>

        <div class="card auth-card text-start">
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label-sm-bold">用户名</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="请设置用户名" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm-bold">邮箱</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control"
                                   placeholder="请输入邮箱地址" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm-bold">密码</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="请设置密码" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label-sm-bold">确认密码</label>
                        <div class="input-group input-icon-wrap">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirm" class="form-control"
                                   placeholder="再次输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth btn-auth-success">
                        <i class="bi bi-check-circle me-1"></i> 立即注册
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                已有账号？
                <a href="{{ url_for('login') }}" class="fw-bold text-primary text-decoration-none ms-1">
                    去登录
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
